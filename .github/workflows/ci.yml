name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild test \
            -project Kkachi.xcodeproj \
            -scheme Kkachi \
            -destination 'platform=macOS'

      - name: Build release configuration without signing
        run: |
          xcodebuild build \
            -project Kkachi.xcodeproj \
            -scheme Kkachi \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
