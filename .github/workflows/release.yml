name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  notarized-dmg:
    name: Build, notarize, and publish DMG
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      APP_NAME: Kkachi
      PROJECT: Kkachi.xcodeproj
      SCHEME: Kkachi
      CONFIGURATION: Release

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$MACOS_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          ARCHIVE_PATH="$RUNNER_TEMP/$APP_NAME.xcarchive"
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=macOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application"

      - name: Export Developer ID app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          ARCHIVE_PATH="$RUNNER_TEMP/$APP_NAME.xcarchive"
          EXPORT_DIR="$RUNNER_TEMP/export"
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"

          cat > "$EXPORT_OPTIONS" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath "$EXPORT_DIR"

      - name: Verify release version and signature
        run: |
          set -euo pipefail

          APP="$RUNNER_TEMP/export/$APP_NAME.app"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Contents/Info.plist")"
          EXPECTED_VERSION="${GITHUB_REF_NAME#v}"

          test "$VERSION" = "$EXPECTED_VERSION" || {
            echo "Tag $GITHUB_REF_NAME does not match app version $VERSION"
            exit 1
          }

          codesign --verify --strict --verbose=2 "$APP"
          codesign -dvv "$APP" 2>&1 | grep -E "Authority=Developer ID Application|flags=.*runtime"

      - name: Package DMG
        run: |
          set -euo pipefail

          APP="$RUNNER_TEMP/export/$APP_NAME.app"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Contents/Info.plist")"
          RELEASE_DIR="$GITHUB_WORKSPACE/build/release"
          STAGE="$RUNNER_TEMP/dmg"
          DMG="$RELEASE_DIR/$APP_NAME-$VERSION.dmg"

          rm -rf "$RELEASE_DIR" "$STAGE"
          mkdir -p "$RELEASE_DIR" "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "$APP_NAME" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"

      - name: Notarize and staple DMG
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -vvv -t install "$DMG_PATH" || true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          SHA_PATH="$DMG_PATH.sha256"
          shasum -a 256 "$DMG_PATH" | tee "$SHA_PATH"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$DMG_PATH" "$SHA_PATH" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$DMG_PATH" "$SHA_PATH" \
              --title "Kkachi ${GITHUB_REF_NAME#v}" \
              --notes "Notarized Developer ID build for macOS."
          fi
